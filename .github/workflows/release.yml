name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo build

      # NOTE: First publish must be done manually with `npm publish --access public`
      # because OIDC provenance requires the package to already exist on npm.
      # After the first manual publish, this workflow will handle subsequent releases.
      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm -r publish --provenance --access public
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
